# HR Rollout Insights Agent — Rollout Initiative Configuration
#
# HOW TO ADD YOUR DOCUMENTS:
# 1. Create a folder inside this directory, e.g. docs/my-rollout/
# 2. Copy your PDF files into that folder
# 3. Add an entry below under "rollouts" pointing to that folder
# 4. Ask the agent: "Ingest documents for <your rollout name>"
#
# Supported file types: .pdf, .txt, .md, .csv
# Supported source types: "local" (folder on disk), "sharepoint" (SharePoint Online)

rollouts:

  # ── GJPM — Global Job Profile Management Rollout ─────────────────────────
  - name: "GJPM"
    sources:
      - type: local
        connection:
          folder_path: "./docs/gjpm"
        doc_type_hints:
          - project_plan
          - training_material
          - change_management
          - comms_plan
          - go_live_checklist

  # ── Example: Local PDF folder ────────────────────────────────────────────
  # Uncomment and update the block below to point to your PDF documents.
